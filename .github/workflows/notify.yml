name: Lunar Notification

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # update version

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies   # 🔥 sửa chỗ này
        run: |
          pip install requests lunarcalendar pytz

      - name: Run script
        run: python check_cat_day.py
